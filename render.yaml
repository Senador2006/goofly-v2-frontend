services:
  - type: web
    name: goofly-v2-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_GATEWAY_URL
        value: https://goofly-v2-api-gateway.onrender.com/api/v1
      - key: VITE_USE_SERVICES_DIRECT
        value: "0"
      - key: VITE_ENV
        value: production
      - key: VITE_TURNSTILE_SITE_KEY
        value: 0x4AAAAAADSwci_iwR-Xdxpl
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
